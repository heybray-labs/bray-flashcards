name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Required check contexts (org ruleset): "guards / guards" and "verify".
  # Do not add paths filters/paths-ignore: a PR that skips this workflow
  # blocks forever on "Expected" for the required checks.
  guards:
    uses: heybray-labs/.github/.github/workflows/guards.yml@main

  verify:
    name: verify
    needs: guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run build

      - run: npm run test --workspace=packages/flashcards-client

  migrate:
    name: Database init
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: flashcards_app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d flashcards_app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Apply migrations and seed on fresh database
        run: npm run db:init
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/flashcards_app

  api-tests:
    name: API tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: flashcards_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d flashcards_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run API smoke tests
        run: npm run test:api
        env:
          CI: true
          SKIP_TEST_DOCKER: "1"
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/flashcards_test
          JWT_SECRET: ci-test-secret
          AUTH_PROTOCOL: local
          APP_URL: http://localhost:5175
          RATE_LIMIT_MAX: "10000"
          AUTH_RATE_LIMIT_MAX: "10000"
          MEDIA_DIR: /tmp/bray-flashcards-test-media

  docker-build:
    name: Docker build (smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
